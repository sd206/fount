name: Deploy Fount

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    name: Deploy Web + Functions to Firebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared
        run: yarn workspace @fount/shared build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Debug api.ts
        run: grep -n "BASE\|API_URL" apps/web/src/lib/api.ts

      - name: Clean Next.js cache
        run: rm -rf apps/web/.next apps/web/out

      - name: Build web
        run: yarn workspace @fount/web build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          # No NEXT_PUBLIC_API_URL — production uses /api/v1 proxy via Firebase Hosting

      - name: Debug out/ content
        run: |
          echo "=== Files still containing Cloud Run URL ==="
          grep -r "xpdnxjudvq" apps/web/out --include="*.js" -l 2>/dev/null || echo "NONE — Cloud Run URL is gone"
          echo "=== Files containing /api/v1 ==="
          grep -r "api/v1" apps/web/out --include="*.js" -l 2>/dev/null || echo "NONE"

      - name: Build API for Functions
        run: yarn workspace @fount/api build

      - name: Deploy Firebase Functions
        run: firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --project fount-app-prod-fb

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project fount-app-prod-fb
