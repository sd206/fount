name: Deploy Fount

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    name: Deploy Web + Functions to Firebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared
        run: yarn workspace @fount/shared build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Build web
        run: yarn workspace @fount/web build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          # No NEXT_PUBLIC_API_URL — production uses /api/v1 proxy via Firebase Hosting

      - name: Build API for Functions
        run: yarn workspace @fount/api build

      - name: Deploy to Firebase
        run: firebase deploy --only hosting,functions --token "${{ secrets.FIREBASE_TOKEN }}" --project fount-app-prod-fb
