steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - 'us-central1-docker.pkg.dev/fount-app-prod-fb/fount/api:latest'
      - -f
      - apps/api/Dockerfile
      - .

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-central1-docker.pkg.dev/fount-app-prod-fb/fount/api:latest'

  # 3. Deploy to Cloud Run (same project as Firebase Hosting)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - fount-api
      - --image=us-central1-docker.pkg.dev/fount-app-prod-fb/fount/api:latest
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --command=node
      - --args=dist/index.js
      - --project=fount-app-prod-fb
      - --set-env-vars=FIREBASE_PROJECT_ID=fount-app-prod-fb,FIREBASE_STORAGE_BUCKET=fount-app-prod-fb.appspot.com
      - --set-secrets=OPENAI_API_KEY=openai-api-key:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,PINECONE_API_KEY=pinecone-api-key:latest

  # 4. Deploy jobs server to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - fount-jobs
      - --image=us-central1-docker.pkg.dev/fount-app-prod-fb/fount/api:latest
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated
      - --min-instances=0
      - --max-instances=5
      - --memory=1Gi
      - --timeout=300s
      - --command=node
      - --args=dist/jobsServer.js
      - --project=fount-app-prod-fb
      - --set-env-vars=FIREBASE_PROJECT_ID=fount-app-prod-fb,FIREBASE_STORAGE_BUCKET=fount-app-prod-fb.appspot.com
      - --set-secrets=OPENAI_API_KEY=openai-api-key:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,PINECONE_API_KEY=pinecone-api-key:latest

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
