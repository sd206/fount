steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/fount/api:latest'
      - -f
      - apps/api/Dockerfile
      - .

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/fount/api:latest'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - fount-api
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/fount/api:latest
      - --region=$_REGION
      - --platform=managed
      - --no-allow-unauthenticated
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --set-env-vars=FIREBASE_STORAGE_BUCKET=fount-app-prod-fb.appspot.com
      - --set-secrets=OPENAI_API_KEY=openai-api-key:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,PINECONE_API_KEY=pinecone-api-key:latest

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
